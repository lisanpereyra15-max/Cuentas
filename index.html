<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuentas.licho | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="pb-32">

    <div class="bg-slate-900 text-white pt-12 pb-24 px-6 rounded-b-[50px] shadow-2xl">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h1 class="font-extrabold text-xl tracking-tight text-indigo-400">CUENTAS.LICHO</h1>
                <span class="bg-indigo-500/20 text-indigo-300 text-[10px] px-3 py-1 rounded-full border border-indigo-500/30">ABRIL 2026</span>
            </div>
            
            <p class="text-xs opacity-50 uppercase font-bold tracking-widest">Efectivo Disponible</p>
            <div class="text-5xl font-black mt-1" id="balance-total">$0</div>
            
            <div class="grid grid-cols-3 gap-3 mt-10">
                <div class="bg-white/5 p-3 rounded-2xl border border-white/10">
                    <p class="text-[10px] opacity-60">Ingresos</p>
                    <p class="text-sm font-bold text-emerald-400" id="resumen-ingresos">+$0</p>
                </div>
                <div class="bg-white/5 p-3 rounded-2xl border border-white/10">
                    <p class="text-[10px] opacity-60">Gastos</p>
                    <p class="text-sm font-bold text-rose-400" id="resumen-gastos">-$0</p>
                </div>
                <div class="bg-indigo-500/20 p-3 rounded-2xl border border-indigo-500/40">
                    <p class="text-[10px] text-indigo-300 font-bold">Ahorro</p>
                    <p class="text-sm font-bold text-indigo-300" id="resumen-ahorro">$0</p>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto px-6 -mt-12">
        
        <div id="form-container" class="hidden glass p-8 rounded-[35px] shadow-2xl mb-8 border border-white relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10 text-6xl"><i class="fa-solid fa-wallet"></i></div>
            <h2 class="font-bold text-slate-800 mb-6 relative">Nuevo Movimiento</h2>
            <div class="space-y-4 relative">
                <input type="number" id="monto" placeholder="0.00" class="w-full p-4 rounded-2xl bg-slate-50 border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none text-2xl font-bold">
                <input type="text" id="concepto" placeholder="¿En qué se fue la plata?" class="w-full p-4 rounded-2xl bg-slate-50 border-none ring-1 ring-slate-200 outline-none">
                
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setTipo('gasto')" id="btn-gasto" class="tipo-btn p-3 rounded-xl border-2 border-rose-100 text-rose-600 font-bold text-sm bg-rose-50">Gasto</button>
                    <button onclick="setTipo('ingreso')" id="btn-ingreso" class="tipo-btn p-3 rounded-xl border-2 border-transparent text-slate-400 font-bold text-sm bg-slate-50">Ingreso</button>
                    <button onclick="setTipo('ahorro')" id="btn-ahorro" class="tipo-btn p-3 rounded-xl border-2 border-transparent text-slate-400 font-bold text-sm bg-slate-50">Ahorro</button>
                </div>

                <button onclick="guardarRegistro()" class="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl hover:bg-indigo-600 transition-all shadow-xl active:scale-95 mt-4">
                    Confirmar Registro
                </button>
            </div>
        </div>

        <h3 class="text-slate-400 font-bold text-xs uppercase tracking-widest mb-4 ml-2">Historial Reciente</h3>
        <div class="space-y-4" id="lista-movimientos">
            </div>
    </div>

    <div class="fixed bottom-8 left-0 right-0 flex justify-center z-50">
        <div class="glass flex items-center gap-10 px-10 py-5 rounded-full shadow-2xl border border-white/50">
            <button class="text-indigo-600 text-2xl"><i class="fa-solid fa-house-chimney"></i></button>
            <button onclick="toggleForm()" class="bg-indigo-600 text-white w-16 h-16 rounded-full flex items-center justify-center text-3xl shadow-lg hover:scale-110 transition-all active:scale-90 border-4 border-white">
                <i class="fa-solid fa-plus transition-transform duration-300" id="btn-icon"></i>
            </button>
            <button class="text-slate-300 text-2xl"><i class="fa-solid fa-chart-line"></i></button>
        </div>
    </div>

    <script>
        let movimientos = JSON.parse(localStorage.getItem('cuentas_licho_v2')) || [];
        let tipoSeleccionado = 'gasto';

        function setTipo(t) {
            tipoSeleccionado = t;
            document.querySelectorAll('.tipo-btn').forEach(btn => {
                btn.classList.remove('border-rose-100', 'bg-rose-50', 'text-rose-600', 'border-emerald-100', 'bg-emerald-50', 'text-emerald-600', 'border-indigo-100', 'bg-indigo-50', 'text-indigo-600');
                btn.classList.add('border-transparent', 'bg-slate-50', 'text-slate-400');
            });

            const activeBtn = document.getElementById(`btn-${t}`);
            activeBtn.classList.remove('border-transparent', 'bg-slate-50', 'text-slate-400');
            
            if(t === 'gasto') activeBtn.classList.add('border-rose-100', 'bg-rose-50', 'text-rose-600');
            if(t === 'ingreso') activeBtn.classList.add('border-emerald-100', 'bg-emerald-50', 'text-emerald-600');
            if(t === 'ahorro') activeBtn.classList.add('border-indigo-100', 'bg-indigo-50', 'text-indigo-600');
        }

        function toggleForm() {
            const form = document.getElementById('form-container');
            const icon = document.getElementById('btn-icon');
            form.classList.toggle('hidden');
            icon.classList.toggle('rotate-45');
        }

        function guardarRegistro() {
            const monto = document.getElementById('monto').value;
            const concepto = document.getElementById('concepto').value;

            if(!monto || !concepto) return;

            const registro = {
                id: Date.now(),
                monto: parseFloat(monto),
                concepto,
                tipo: tipoSeleccionado,
                fecha: new Date().toLocaleDateString('es-AR', { day: '2-digit', month: 'short' })
            };

            movimientos.unshift(registro);
            localStorage.setItem('cuentas_licho_v2', JSON.stringify(movimientos));
            
            document.getElementById('monto').value = '';
            document.getElementById('concepto').value = '';
            toggleForm();
            render();
        }

        function borrar(id) {
            movimientos = movimientos.filter(m => m.id !== id);
            localStorage.setItem('cuentas_licho_v2', JSON.stringify(movimientos));
            render();
        }

        function render() {
            const lista = document.getElementById('lista-movimientos');
            let total = 0, ingresos = 0, gastos = 0, ahorro = 0;
            lista.innerHTML = '';

            movimientos.forEach(m => {
                if(m.tipo === 'ingreso') { ingresos += m.monto; total += m.monto; }
                if(m.tipo === 'gasto') { gastos += m.monto; total -= m.monto; }
                if(m.tipo === 'ahorro') { ahorro += m.monto; total -= m.monto; } // El ahorro sale del disponible

                const config = {
                    ingreso: { color: 'emerald', icon: 'plus' },
                    gasto: { color: 'rose', icon: 'minus' },
                    ahorro: { color: 'indigo', icon: 'piggy-bank' }
                }[m.tipo];

                lista.innerHTML += `
                    <div class="bg-white p-5 rounded-[25px] flex items-center card-shadow border border-white/60">
                        <div class="w-12 h-12 bg-${config.color}-50 text-${config.color}-500 rounded-2xl flex items-center justify-center text-xl">
                            <i class="fa-solid fa-${config.icon}"></i>
                        </div>
                        <div class="ml-4 flex-grow">
                            <p class="font-bold text-slate-800 leading-tight">${m.concepto}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">${m.fecha} • ${m.tipo}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-extrabold text-${config.color}-600 text-lg">$${m.monto.toLocaleString()}</p>
                            <button onclick="borrar(${m.id})" class="text-[10px] text-slate-300 font-bold hover:text-rose-500 transition-colors uppercase">Quitar</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('balance-total').innerText = `$${total.toLocaleString()}`;
            document.getElementById('resumen-ingresos').innerText = `+$${ingresos.toLocaleString()}`;
            document.getElementById('resumen-gastos').innerText = `-$${gastos.toLocaleString()}`;
            document.getElementById('resumen-ahorro').innerText = `$${ahorro.toLocaleString()}`;
        }

        render();
    </script>
</body>
</html>
